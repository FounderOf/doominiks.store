<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOOMINIKS STORE ULTIMATE</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#050505; color:white; font-family:sans-serif; }
.glass {
  background: rgba(255,0,0,0.05);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,0,0,0.2);
  box-shadow: 0 0 25px rgba(255,0,0,0.3);
}
.scroll::-webkit-scrollbar { height:6px; }
.scroll::-webkit-scrollbar-thumb { background:red; }
</style>
</head>

<body>

<!-- NOTIF -->
<div id="notif" class="fixed top-5 right-5 hidden bg-red-600 p-3 rounded"></div>

<!-- LOADING -->
<div id="loading" class="fixed inset-0 flex items-center justify-center bg-black z-50">
<h1 class="text-red-500 text-3xl animate-pulse">DOOMINIKS STORE</h1>
</div>

<!-- AUTH -->
<div id="auth" class="flex flex-col items-center mt-20">
<input id="email" placeholder="Email" class="p-2 m-2 bg-black border glass">
<input id="pass" type="password" placeholder="Password" class="p-2 m-2 bg-black border glass">
<button id="loginBtn" class="bg-red-600 p-2 glass">Login</button>
<button id="regBtn" class="bg-gray-600 p-2 mt-2 glass">Register</button>
<p id="authErr" class="text-red-400"></p>
</div>

<!-- APP -->
<div id="app" class="hidden p-4">

<!-- PROFILE -->
<div class="glass p-4 mb-4 flex justify-between">
<div>
<h2 id="username"></h2>
<p>Coin: <span id="coin"></span></p>
</div>
<button onclick="openCart()" class="bg-yellow-500 p-2">Cart</button>
</div>

<!-- PRODUK -->
<h2>Produk</h2>
<div id="products" class="flex gap-4 overflow-x-auto scroll"></div>

<!-- CART -->
<div id="cartBox" class="hidden glass p-4 mt-4">
<h3>Keranjang</h3>
<div id="cartItems"></div>
<button onclick="checkout()" class="bg-green-600 p-2 mt-2">Checkout</button>
</div>

<!-- ORDER -->
<div class="glass p-4 mt-4">
<h3>Pesanan Saya</h3>
<div id="myOrders"></div>
</div>

<!-- CHAT -->
<div class="glass p-4 mt-4">
<h3>Chat Owner</h3>
<div id="chatBox" class="h-32 overflow-y-auto"></div>
<input id="chatInput" class="w-full bg-black border mt-2">
<button onclick="sendChat()" class="bg-red-600 p-2 mt-2">Kirim</button>
</div>

<!-- OWNER -->
<div id="owner" class="hidden glass p-4 mt-4">

<h2>OWNER DASHBOARD</h2>

<p>Total Order: <span id="totalOrder"></span></p>

<input id="discGlobal" placeholder="Diskon Global %">
<button onclick="setGlobalDisc()">Set</button>

<h3>Tambah Produk</h3>
<input id="pname" placeholder="Nama">
<input id="pprice" placeholder="Harga">
<input id="pimg" placeholder="Image URL">
<button onclick="addProduct()">Tambah</button>

<h3>Orders</h3>
<div id="orders"></div>

<h3>Chat Users</h3>
<div id="ownerChat"></div>

</div>

</div>

<script type="module">

// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore, collection, addDoc, doc, getDoc, setDoc, updateDoc,
onSnapshot, query, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"ISI",
  authDomain:"ISI",
  projectId:"ISI"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ================= STATE =================
let currentUser, userData;
let cart = [];

// ================= AUTH =================
loginBtn.onclick = async ()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,pass.value);
  }catch(e){ authErr.innerText=e.message }
};

regBtn.onclick = async ()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,pass.value);
  }catch(e){ authErr.innerText=e.message }
};

onAuthStateChanged(auth, async user=>{
  loading.style.display="none";
  if(!user) return;

  currentUser=user;
  auth.style.display="none";
  app.classList.remove("hidden");

  let ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{ coin:0, owner:false });
  }

  onSnapshot(ref, s=>{
    userData=s.data();
    username.innerText=user.email;
    coin.innerText=userData.coin;

    if(userData.owner) owner.classList.remove("hidden");
  });

  loadProducts();
  loadOrdersUser();
  loadOrdersOwner();
  loadChat();
});

// ================= PRODUK =================
function loadProducts(){
  onSnapshot(collection(db,"products"), snap=>{
    products.innerHTML="";
    snap.forEach(d=>{
      let p=d.data();
      let el=document.createElement("div");

      el.className="glass p-3 min-w-[200px]";
      el.innerHTML=`
        <img src="${p.img}" class="h-32 w-full object-cover">
        <h3>${p.name}</h3>
        <p>Rp ${p.price}</p>
        <button class="bg-red-600 mt-2 p-1">Tambah</button>
      `;

      el.querySelector("button").onclick=()=>{
        cart.push({id:d.id,...p});
        showNotif("Masuk cart");
      };

      products.appendChild(el);
    });
  });
}

// ================= CART =================
window.openCart = ()=>{
  cartBox.classList.toggle("hidden");
  renderCart();
};

function renderCart(){
  cartItems.innerHTML="";
  cart.forEach((c,i)=>{
    cartItems.innerHTML+=`
      <div>${c.name} - Rp ${c.price}
      <button onclick="removeCart(${i})">X</button></div>`;
  });
}

window.removeCart = (i)=>{
  cart.splice(i,1);
  renderCart();
};

// ================= CHECKOUT =================
window.checkout = async ()=>{
  if(cart.length===0) return;

  let proof = await base64();

  await addDoc(collection(db,"orders"),{
    uid:currentUser.uid,
    items:cart,
    status:"pending",
    proof
  });

  cart=[];
  renderCart();
  showNotif("Order dibuat!");
};

// ================= BASE64 =================
function base64(){
  return new Promise(res=>{
    let i=document.createElement("input");
    i.type="file";

    i.onchange=()=>{
      let r=new FileReader();
      r.onload=()=>res(r.result);
      r.readAsDataURL(i.files[0]);
    };
    i.click();
  });
}

// ================= ORDER =================
function loadOrdersUser(){
  let q=query(collection(db,"orders"),where("uid","==",currentUser.uid));

  onSnapshot(q,snap=>{
    myOrders.innerHTML="";
    snap.forEach(d=>{
      let o=d.data();
      myOrders.innerHTML+=`<p>${o.status}</p>`;
    });
  });
}

function loadOrdersOwner(){
  onSnapshot(collection(db,"orders"), snap=>{
    orders.innerHTML="";
    totalOrder.innerText=snap.size;

    snap.forEach(d=>{
      let o=d.data();
      orders.innerHTML+=`
        <div>${o.uid} - ${o.status}
        <button onclick="updateOrder('${d.id}')">Kirim</button></div>`;
    });
  });
}

window.updateOrder = async (id)=>{
  await updateDoc(doc(db,"orders",id),{status:"dikirim"});
};

// ================= CHAT =================
function loadChat(){
  let q=query(collection(db,"chat"),where("uid","==",currentUser.uid));

  onSnapshot(q,snap=>{
    chatBox.innerHTML="";
    snap.forEach(d=>{
      chatBox.innerHTML+=`<p>${d.data().msg}</p>`;
    });
  });
}

window.sendChat = ()=>{
  addDoc(collection(db,"chat"),{
    uid:currentUser.uid,
    msg:chatInput.value
  });
};

// ================= OWNER =================
window.addProduct = ()=>{
  addDoc(collection(db,"products"),{
    name:pname.value,
    price:Number(pprice.value),
    img:pimg.value,
    stock:999
  });
};

// ================= NOTIF =================
function showNotif(msg){
  notif.innerText=msg;
  notif.classList.remove("hidden");
  setTimeout(()=>notif.classList.add("hidden"),3000);
}

</script>

</body>
</html>
